name: Build Native DLL And MSI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "native/**"
      - ".github/workflows/build-dll.yml"
      - "composeApp/**"
      - "shared/**"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "settings.gradle.kts"
      - "build.gradle.kts"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-artifacts:
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Configure and build native DLL
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VS_INSTALL_PATH=%%i"
          if not defined VS_INSTALL_PATH exit /b 1
          call "%VS_INSTALL_PATH%\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          cmake -S native -B native/build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build native/build
          cmake --install native/build --config Release

      - name: Build Windows MSI
        run: .\gradlew.bat :composeApp:packageMsi
        env:
          JPACKAGE_JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v7
        with:
          name: openyap_native-windows-x64
          path: native/prebuilt/windows-x64/openyap_native.dll
          if-no-files-found: error

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v7
        with:
          name: openyap-msi-windows-x64
          path: composeApp/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            native/prebuilt/windows-x64/openyap_native.dll
            composeApp/build/compose/binaries/main/msi/*.msi
          generate_release_notes: true
